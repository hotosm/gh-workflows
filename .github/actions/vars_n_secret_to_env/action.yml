name: Load Environment Variables
description: Load environment variables from GitHub variables & secrets and parse nested variables

inputs:
  git_branch:
    description: "The Git branch name"
    required: false
    default: ${{ github.ref_name }}
  tag_override:
    description: "Optional tag override"
    required: false
    default: ""
  vars_context:
    description: "JSON string of variables context"
    required: true
  secrets_context:
    description: "JSON string of secrets context"
    required: true
  parse_nested_vars:
    description: "Parse nested variables (like FRONTEND_ENV_VARS)"
    required: false
    default: "true"

runs:
  using: composite
  steps:
    - name: Load Environment Variables
      shell: bash
      env:
        GIT_BRANCH: ${{ inputs.git_branch }}
        TAG_OVERRIDE: ${{ inputs.tag_override }}
        VARS_CONTEXT: ${{ inputs.vars_context }}
        SECRETS_CONTEXT: ${{ inputs.secrets_context }}
        PARSE_NESTED: ${{ inputs.parse_nested_vars }}
      run: |
        set -e
        
        # Random delimiter string for security
        delim=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
        
        # Function to strip carriage returns from input
        strip_cr() {
          tr -d '\r'
        }
        
        # Parse JSON with multiline strings, using delimiter (Github specific)
        # Also strips carriage returns from values
        to_envs() { 
          jq -r "to_entries[] | \"\(.key)<<$delim\n\(.value)\n$delim\n\"" | strip_cr
        }
        
        # Set branch and tag to env (strip any potential \r)
        echo "GIT_BRANCH=$(echo "${GIT_BRANCH}" | strip_cr)" >> $GITHUB_ENV
        if [ -n "${TAG_OVERRIDE}" ]; then
          echo "TAG_OVERRIDE=$(echo "${TAG_OVERRIDE}" | strip_cr)" >> $GITHUB_ENV
        fi
        
        # Set VARS_CONTEXT if not null
        if [ "${VARS_CONTEXT}" != "null" ]; then
          echo "${VARS_CONTEXT}" | to_envs >> $GITHUB_ENV
          
          # Parse nested variables if enabled
          if [ "${PARSE_NESTED}" = "true" ]; then
            # Extract and parse FRONTEND_ENV_VARS from VARS_CONTEXT if it exists
            FRONTEND_VARS=$(echo "${VARS_CONTEXT}" | jq -r '.FRONTEND_ENV_VARS // ""' | strip_cr)
            
            if [ -n "$FRONTEND_VARS" ]; then
              echo "Processing FRONTEND_ENV_VARS..."
              
              # Process each line, stripping \r and handling properly
              echo "$FRONTEND_VARS" | while IFS= read -r line || [[ -n "$line" ]]; do
                # Strip carriage returns from the line
                line=$(echo "$line" | strip_cr)
                
                # Skip empty lines and lines with only asterisks
                [[ -z "$line" ]] && continue
                [[ "$line" =~ ^[\*]+$ ]] && continue
                
                # If line contains '=', export it as an env var
                if [[ "$line" == *"="* ]]; then
                  # Split on first '=' only
                  key="${line%%=*}"
                  value="${line#*=}"
                  
                  # Trim whitespace from key
                  key=$(echo "$key" | xargs)
                  
                  # Skip if key is empty
                  [[ -z "$key" ]] && continue
                  
                  # Use delimiter for multi-line safe export
                  {
                    echo "${key}<<${delim}"
                    echo "${value}"
                    echo "${delim}"
                  } >> $GITHUB_ENV
                  
                  echo "  Exported: $key"
                fi
              done
            fi
          fi
        fi
        
        # Set SECRETS_CONTEXT if not null
        if [ "${SECRETS_CONTEXT}" != "null" ]; then
          echo "${SECRETS_CONTEXT}" | to_envs >> $GITHUB_ENV
        fi
        
        echo "Environment variables loaded successfully!"
